<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Flight Recorder</title>
    <style>
      :root {
        color: #191f28;
        background: #f7f4ee;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f7f4ee;
      }

      .boot-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .boot-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .boot-spinner {
        width: 34px;
        height: 34px;
        border: 3px solid #d9dee5;
        border-top-color: #3182f6;
        border-radius: 50%;
        animation: boot-spin 0.82s linear infinite;
      }

      .boot-content strong {
        font-size: 16px;
        font-weight: 800;
      }

      .boot-content span {
        color: #6b7684;
        font-size: 12px;
        font-weight: 700;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-screen">
        <div class="boot-content">
          <div class="boot-spinner" aria-hidden="true"></div>
          <strong>프로그램을 불러오는 중...</strong>
          <span>Agent Flight Recorder</span>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
